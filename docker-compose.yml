version: "3.9"

services:
  # ── PostgreSQL ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: pickleball_db
    environment:
      POSTGRES_DB: pickleball
      POSTGRES_USER: pickleball_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-pickleball_dev_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pickleball_user -d pickleball"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: pickleball_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── FastAPI Backend ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: pickleball_backend
    environment:
      DATABASE_URL: postgresql+asyncpg://pickleball_user:${DB_PASSWORD:-pickleball_dev_pass}@postgres:5432/pickleball
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-dev_secret_change_in_production_64chars_xxxxxxxxxx}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev_refresh_secret_change_in_production_64chars_xx}
      ZALO_OA_TOKEN: ${ZALO_OA_TOKEN:-}
      ZALO_OA_ID: ${ZALO_OA_ID:-}
      MOMO_PARTNER_CODE: ${MOMO_PARTNER_CODE:-}
      MOMO_ACCESS_KEY: ${MOMO_ACCESS_KEY:-}
      MOMO_SECRET_KEY: ${MOMO_SECRET_KEY:-}
      ZALOPAY_APP_ID: ${ZALOPAY_APP_ID:-}
      ZALOPAY_KEY1: ${ZALOPAY_KEY1:-}
      ZALOPAY_KEY2: ${ZALOPAY_KEY2:-}
      ENVIRONMENT: development
      WEBHOOK_BASE_URL: ${WEBHOOK_BASE_URL:-http://localhost:8000}
      BACKEND_CORS_ORIGINS: "http://localhost:3000,http://localhost:80"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  # ── Next.js Frontend ────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: pickleball_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
      NEXT_PUBLIC_SSE_URL: http://localhost:8000/api/v1/notifications/stream
      NEXT_PUBLIC_APP_NAME: Pickleball Hub
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    depends_on:
      - backend
    command: npm run dev
    restart: unless-stopped

  # ── Nginx reverse proxy ─────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: pickleball_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
